# Server Configuration
server.port=${PORT:8080}

# Actuator Configuration (for health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Application Info
info.app.name=ACA Learning Hello API
info.app.description=Hybrid Spring Boot plus Clojure API for ACA learning
info.app.version=1.0.0

# Logging
logging.level.com.example.acahello=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Minimal auth settings (override with environment variables in ACA)
app.security.username=${APP_SECURITY_USERNAME:acauser}
app.security.password=${APP_SECURITY_PASSWORD:REPLACE_ME_STRONG_PASSWORD}

# JWT settings
app.jwt.secret=${APP_JWT_SECRET:REPLACE_ME_32_PLUS_CHAR_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:3600000}