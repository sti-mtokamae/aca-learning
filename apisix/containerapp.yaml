name: apisix-gateway
location: japaneast
properties:
  managedEnvironmentId: __MANAGED_ENVIRONMENT_ID__
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      targetPort: 9080
      transport: Auto
  template:
    containers:
    - name: etcd
      image: quay.io/coreos/etcd:v3.5.9
      command:
      - etcd
      args:
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://127.0.0.1:2380
      - --initial-cluster=etcd0=http://127.0.0.1:2380
      - --initial-cluster-token=etcd-cluster
      - --initial-cluster-state=new
      resources:
        cpu: 0.25
        memory: 0.5Gi
      volumeMounts:
      - volumeName: etcd-data
        mountPath: /etcd-data
    - name: apisix
      image: apache/apisix:3.7.0-debian
      env:
      - name: APISIX_DEPLOYMENT_ETCD_HOST
        value: '["http://127.0.0.1:2379"]'
      - name: APISIX_STAND_ALONE
        value: "false"
      - name: APISIX_DEPLOYMENT_ADMIN_ALLOW_ADMIN
        value: '["0.0.0.0/0"]'
      resources:
        cpu: 0.5
        memory: 1Gi
    - name: route-loader
      image: curlimages/curl:8.8.0
      command:
      - /bin/sh
      - -c
      args:
      - |
        set -eu
        APISIX_KEY="__APISIX_ADMIN_KEY__"
        HELLO_HOST="__HELLO_API_HOST__"

        until curl -sS -m 3 -H "X-API-KEY: ${APISIX_KEY}" http://127.0.0.1:9180/apisix/admin/routes >/dev/null 2>&1; do
          echo "route-loader: waiting for APISIX admin..."
          sleep 2
        done

        echo "route-loader: registering /hello"
        curl -sS -X PUT http://127.0.0.1:9180/apisix/admin/routes/hello-root \
          -H "X-API-KEY: ${APISIX_KEY}" -H "Content-Type: application/json" \
          -d "{\"uri\":\"/hello\",\"upstream\":{\"type\":\"roundrobin\",\"scheme\":\"https\",\"pass_host\":\"node\",\"nodes\":{\"${HELLO_HOST}:443\":1}},\"plugins\":{\"proxy-rewrite\":{\"uri\":\"/api/hello\"}}}"

        echo "route-loader: registering /hello/*"
        curl -sS -X PUT http://127.0.0.1:9180/apisix/admin/routes/hello-wildcard \
          -H "X-API-KEY: ${APISIX_KEY}" -H "Content-Type: application/json" \
          -d "{\"uri\":\"/hello/*\",\"methods\":[\"GET\"],\"upstream\":{\"type\":\"roundrobin\",\"scheme\":\"https\",\"pass_host\":\"node\",\"nodes\":{\"${HELLO_HOST}:443\":1}},\"plugins\":{\"proxy-rewrite\":{\"regex_uri\":[\"^/hello/(.*)\",\"/api/hello/\$1\"]}}}"

        echo "route-loader: registering /status"
        curl -sS -X PUT http://127.0.0.1:9180/apisix/admin/routes/status \
          -H "X-API-KEY: ${APISIX_KEY}" -H "Content-Type: application/json" \
          -d "{\"uri\":\"/status\",\"upstream\":{\"type\":\"roundrobin\",\"scheme\":\"https\",\"pass_host\":\"node\",\"nodes\":{\"${HELLO_HOST}:443\":1}},\"plugins\":{\"proxy-rewrite\":{\"uri\":\"/api/status\"}}}"

        echo "route-loader: registering /auth/login"
        curl -sS -X PUT http://127.0.0.1:9180/apisix/admin/routes/auth-login \
          -H "X-API-KEY: ${APISIX_KEY}" -H "Content-Type: application/json" \
          -d "{\"uri\":\"/auth/login\",\"methods\":[\"POST\"],\"upstream\":{\"type\":\"roundrobin\",\"scheme\":\"https\",\"pass_host\":\"node\",\"nodes\":{\"${HELLO_HOST}:443\":1}},\"plugins\":{\"proxy-rewrite\":{\"uri\":\"/api/auth/login\"}}}"

        echo "route-loader: done"
        tail -f /dev/null
      resources:
        cpu: 0.25
        memory: 0.5Gi
    volumes:
    - name: etcd-data
      storageType: EmptyDir
    scale:
      minReplicas: 1
      maxReplicas: 3